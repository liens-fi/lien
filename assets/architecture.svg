    <line x1="450" y1="70" x2="508" y2="70" stroke="#D4AF37" stroke-width="2"/>
    <polygon points="500,66 508,70 500,74" fill="#D4AF37"/>

    <rect x="32" y="160" width="656" height="120" fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="6 6"/>
    <text x="56" y="186" font-size="11" letter-spacing="2" fill="#D4AF37">HOOK LIBRARY</text>
    <g font-size="11" fill="#F0EAD6">
      <text x="56"  y="218">DynamicLTV</text>
