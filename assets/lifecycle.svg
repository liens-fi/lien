<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="Lien lifecycle events">
  <title>Lifecycle events</title>
  <rect width="720" height="200" fill="#3D2817"/>
  <g font-family="Space Mono, monospace" font-size="11" fill="#F0EAD6" letter-spacing="1">
    <line x1="40" y1="100" x2="680" y2="100" stroke="#D4AF37" stroke-width="2"/>
    <g>
      <circle cx="100" cy="100" r="6" fill="#E63946"/><text x="100" y="80" text-anchor="middle">beforeDeposit</text><text x="100" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;0</text>
      <circle cx="200" cy="100" r="6" fill="#FFD976"/><text x="200" y="80" text-anchor="middle">afterDeposit</text><text x="200" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;1</text>
      <circle cx="300" cy="100" r="6" fill="#E63946"/><text x="300" y="80" text-anchor="middle">beforeBorrow</text><text x="300" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;2</text>
      <circle cx="400" cy="100" r="6" fill="#FFD976"/><text x="400" y="80" text-anchor="middle">afterBorrow</text><text x="400" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;3</text>
      <circle cx="500" cy="100" r="6" fill="#E63946"/><text x="500" y="80" text-anchor="middle">beforeRepay</text><text x="500" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;4</text>
      <circle cx="600" cy="100" r="6" fill="#FFD976"/><text x="600" y="80" text-anchor="middle">afterRepay</text><text x="600" y="124" text-anchor="middle" font-size="9" fill="#D4AF37">1&lt;&lt;5</text>
    </g>
    <g>
      <text x="40" y="170" font-size="10" fill="#D4AF37">beforeLiquidate · 1&lt;&lt;6</text>
      <text x="240" y="170" font-size="10" fill="#D4AF37">afterLiquidate · 1&lt;&lt;7</text>
      <text x="440" y="170" font-size="10" fill="#D4AF37">capability bits sit in 1&lt;&lt;8 … 1&lt;&lt;11</text>
    </g>
  </g>
</svg>
