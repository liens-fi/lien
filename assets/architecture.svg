<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" role="img" aria-label="Lien architecture overview">
  <title>Lien architecture overview</title>
  <rect width="720" height="320" fill="#3D2817"/>
  <g font-family="Space Mono, monospace" font-size="13" fill="#F0EAD6" letter-spacing="1.5">
    <rect x="32" y="40" width="180" height="60" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <text x="122" y="68" text-anchor="middle">ADAPTERS · rim</text>
    <text x="122" y="86" text-anchor="middle" font-size="11" fill="#D4AF37">marginfi · kamino · solend</text>

    <rect x="270" y="40" width="180" height="60" fill="none" stroke="#5BC0EB" stroke-width="2"/>
    <text x="360" y="68" text-anchor="middle">RUNTIME · middle</text>
    <text x="360" y="86" text-anchor="middle" font-size="11" fill="#5BC0EB">composition · simulator</text>

    <rect x="508" y="40" width="180" height="60" fill="none" stroke="#E63946" stroke-width="2"/>
    <text x="598" y="68" text-anchor="middle">EXECUTOR · core</text>
    <text x="598" y="86" text-anchor="middle" font-size="11" fill="#E63946">anchor 0.31 program</text>

    <line x1="212" y1="70" x2="270" y2="70" stroke="#D4AF37" stroke-width="2"/>
