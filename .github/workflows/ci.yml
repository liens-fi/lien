name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: cargo test (host targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p lien-hook-runtime
      - run: cargo test -p lien-hook-runtime
      - run: cargo check -p lien-hook-library
      - run: cargo test -p lien-hook-library

  manifests:
    name: manifest vs README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check libs advertised in README live in some Cargo.toml or package.json
        shell: bash
        run: |
          set -e
          checks=(
            "Marginfi:marginfi-client-v2"
            "Kamino:klend-sdk"
            "Solend:solend-sdk"
            "Anchor 0.31:anchor-lang"
          )
          for entry in "${checks[@]}"; do
            label="${entry%%:*}"
            dep="${entry##*:}"
            if grep -qi "$label" README.md; then
              if ! grep -rqE "$dep" packages/ --include="Cargo.toml" --include="package.json"; then
                echo "::error::README mentions '$label' but no manifest declares '$dep'"
                exit 1
              fi
            fi
          done
          echo "manifest OK"

  sdk-simulator:
    name: sdk simulator typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: standalone typecheck of the SDK simulator
        shell: bash
        run: |
          cd packages/sdk-ts
          npm install --silent --no-save typescript@5.7.2 @types/node@22.10.5
          # simulator is the part of the SDK with no external SDK type deps —
          # we deliberately scope tsc to it so external SDK upstream churn
          # cannot turn this job red.
          npx tsc --noEmit --strict --skipLibCheck \
            --target ES2022 --module ESNext --moduleResolution Bundler \
            --esModuleInterop --resolveJsonModule \
            src/composition.ts src/hooks.ts src/simulator.ts

